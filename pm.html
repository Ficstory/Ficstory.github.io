<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=./">
    <title>이재호 포트폴리오로 이동 중</title>
    <style>
        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            font-family: "Pretendard", "Noto Sans KR", "Segoe UI", Arial, sans-serif;
            background: #f7f9fc;
            color: #172033;
        }

        main {
            width: min(520px, calc(100% - 40px));
            padding: 32px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        p {
            margin: 0 0 20px;
            color: #667085;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 8px;
            background: #172033;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>최신 포트폴리오로 이동합니다.</h1>
        <p>PM 전용 페이지는 최신 FE/Client 포트폴리오 진입점으로 통합했습니다.</p>
        <a href="./">바로 이동하기</a>
    </main>
</body>
</html>
